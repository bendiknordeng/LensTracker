name: LensTracker
options:
  bundleIdPrefix: com.lenstrack
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  LensTracker:
    type: application
    platform: iOS
    sources:
      - LensTracker
    settings:
      base:
        INFOPLIST_FILE: LensTracker/Info.plist
        CODE_SIGN_ENTITLEMENTS: LensTracker/LensTracker.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.lenstrack.app
    dependencies:
      - target: LensTrackerWidgetExtension

  LensTrackerWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - LensTrackerWidget
    settings:
      base:
        INFOPLIST_FILE: LensTrackerWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: LensTrackerWidget/LensTrackerWidgetExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.lenstrack.app.widget
